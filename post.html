<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | BibleFunLand Studios</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
    <style>
        .post-page { padding: 140px 0 80px; }
        .post-container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
        .post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .post-category { font-size: 0.72rem; font-weight: 700; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .post-date { font-size: 0.8rem; color: var(--text-light); }
        .post-read-time { font-size: 0.8rem; color: var(--text-light); }
        .post-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 900; color: var(--primary); margin-bottom: 24px; line-height: 1.2; }
        .post-image { width: 100%; height: 320px; object-fit: cover; border-radius: var(--radius); margin-bottom: 32px; }
        .post-body { font-size: 1rem; line-height: 2; color: var(--text); }
        .post-body h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 32px 0 12px; color: var(--primary); }
        .post-body h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin: 24px 0 10px; color: var(--primary); }
        .post-body p { margin-bottom: 16px; }
        .post-body blockquote { border-left: 3px solid var(--accent); padding: 12px 20px; margin: 20px 0; font-style: italic; color: var(--text-light); background: var(--bg-alt); border-radius: 0 8px 8px 0; }
        .post-body ul, .post-body ol { margin: 12px 0 12px 24px; }
        .post-body li { margin-bottom: 6px; }
        .post-body a { color: var(--accent-dark); text-decoration: underline; }
        .post-back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; font-size: 0.85rem; font-weight: 600; color: var(--text-light); text-decoration: none; }
        .post-back:hover { color: var(--primary); }
        .post-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.06); text-align: center; }
        .post-footer a { display: inline-flex; padding: 12px 28px; background: var(--primary); color: white; border-radius: 50px; font-weight: 700; font-size: 0.85rem; text-decoration: none; transition: all 0.2s; }
        .post-footer a:hover { background: var(--accent); color: var(--primary); }
        .post-not-found { text-align: center; padding: 80px 20px; }
        .post-not-found h2 { font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom: 12px; }
        .post-not-found p { color: var(--text-light); }

        .cat-devotional { background: #d1fae5; color: #065f46; }
        .cat-insight { background: #ede9fe; color: #6d28d9; }
        .cat-behind { background: #fef3c7; color: #92400e; }
        .cat-tutorial { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <script src="theme-loader.js"></script>

    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">BibleFunLand<span class="logo-accent">Studios</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="index.html#contact" class="btn btn-nav">Get In Touch</a></li>
            </ul>
        </div>
    </nav>

    <section class="post-page">
        <div class="post-container" id="postContainer">
            <!-- Post content loaded by JS -->
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 BibleFunLand Studios. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Get post ID from URL
        const params = new URLSearchParams(window.location.search);
        const postId = parseInt(params.get('id'));
        const container = document.getElementById('postContainer');

        const posts = JSON.parse(localStorage.getItem('bfl-blog-posts') || '[]');
        const post = posts.find(p => p.id === postId);

        if (post) {
            const catClass = 'cat-' + post.category;
            document.title = post.title + ' | BibleFunLand Studios';

            container.innerHTML = `
                <a href="blog.html" class="post-back">← Back to Blog</a>
                <div class="post-meta">
                    <span class="post-category ${catClass}">${post.category}</span>
                    <span class="post-date">${post.date}</span>
                    <span class="post-read-time">${post.readTime}</span>
                </div>
                <h1 class="post-title">${post.title}</h1>
                ${post.image ? '<img class="post-image" src="' + post.image + '" alt="' + post.title + '">' : ''}
                <div class="post-body">${post.content}</div>
                <div class="post-footer">
                    <a href="blog.html">← More Posts</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="post-not-found">
                    <h2>Post not found</h2>
                    <p>This post may have been removed or the link is incorrect.</p>
                    <br><a href="blog.html" class="post-back">← Back to Blog</a>
                </div>
            `;
        }
    </script>
</body>
</html>
