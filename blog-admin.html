<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Studio | BibleFunLand Studios</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
    <link rel="stylesheet" href="blog.css">
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            padding: 60px 20px; 
            position: relative;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; }

        .header { 
            text-align: center; 
            margin-bottom: 50px; 
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            color: var(--primary); 
            letter-spacing: -1.5px;
            font-weight: 900;
        }

        .header p { 
            color: var(--text-light); 
            font-size: 1.1rem; 
            margin-top: 10px; 
            font-weight: 500;
        }

        .studio-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px);
            border-radius: 30px; 
            padding: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
        }

        .studio-card h2 { 
            font-size: 0.9rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 24px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-field { margin-bottom: 20px; }
        .form-field label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-field input, .form-field select, .form-field textarea {
            width: 100%; 
            padding: 14px 18px; 
            border: 1.5px solid rgba(0,0,0,0.06); 
            border-radius: 14px;
            font-family: inherit; 
            font-size: 1rem; 
            background: white; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text);
        }

        .form-field input:focus, .form-field select:focus, .form-field textarea:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(232, 168, 56, 0.1);
            transform: translateY(-1px);
        }

        .form-field textarea { min-height: 100px; resize: vertical; line-height: 1.7; }

        .btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            padding: 14px 28px; 
            border-radius: 100px; 
            font-weight: 700; 
            font-size: 0.9rem; 
            cursor: pointer; 
            border: none; 
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { 
            background: var(--primary-light); 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(26, 46, 90, 0.2);
        }

        .btn-accent { background: var(--accent); color: var(--primary); }
        .btn-accent:hover { 
            background: #ffffff; 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(232, 168, 56, 0.25);
        }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }

        .editor-toolbar { 
            display: flex; 
            gap: 6px; 
            flex-wrap: wrap; 
            padding: 12px; 
            background: rgba(255,255,255,0.5); 
            border: 1.5px solid rgba(0,0,0,0.06); 
            border-bottom: none; 
            border-radius: 18px 18px 0 0; 
        }

        .toolbar-btn { 
            width: 36px; 
            height: 36px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            background: white; 
            cursor: pointer; 
            border-radius: 10px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: var(--text); 
            transition: all 0.2s;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .toolbar-btn:hover { 
            background: var(--accent); 
            color: var(--primary);
            transform: translateY(-2px);
        }

        .editor-content { 
            min-height: 400px; 
            padding: 30px; 
            border: 1.5px solid rgba(0,0,0,0.06); 
            border-top: none; 
            border-radius: 0 0 18px 18px; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            color: var(--text); 
            outline: none; 
            background: white; 
            overflow-y: auto; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .provider-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 24px; }
        .provider-card { 
            padding: 20px; 
            border: 2px solid rgba(0,0,0,0.06); 
            border-radius: 18px; 
            cursor: pointer; 
            transition: all 0.3s; 
            text-align: center; 
            background: white;
        }

        .provider-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .provider-card.selected { border-color: var(--primary); background: rgba(26, 46, 90, 0.05); }

        .post-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: white;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s;
        }

        .post-item:hover { 
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-color: var(--accent);
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .form-row, .provider-grid { grid-template-columns: 1fr; }
            .studio-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <!-- Hero Blobs -->
    <div class="hero-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

<div class="container">
    <a href="blog.html" class="post-back">← Back to Blog</a>
    
    <div class="header">
        <h1>✦ Blog Studio</h1>
        <p>Crafting stories, insights, and faith-filled content with AI intelligence.</p>
    </div>

    <!-- AI Settings -->
    <div class="studio-card">
        <h2>⚙️ Studio Intelligence</h2>
        <div class="provider-grid">
            <div class="provider-card selected" data-provider="gemini" onclick="selectProvider('gemini')">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">✨</div>
                <div style="font-weight: 800;">Google Gemini</div>
                <div style="font-size: 0.75rem; color: var(--text-light);">Ultra Fast & Creative</div>
            </div>
            <div class="provider-card" data-provider="openai" onclick="selectProvider('openai')">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">🤖</div>
                <div style="font-weight: 800;">OpenAI GPT</div>
                <div style="font-size: 0.75rem; color: var(--text-light);">GPT-4o Intelligence</div>
            </div>
            <div class="provider-card" data-provider="claude" onclick="selectProvider('claude')">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">🖋️</div>
                <div style="font-weight: 800;">Anthropic Claude</div>
                <div style="font-size: 0.75rem; color: var(--text-light);">Nuanced Writing</div>
            </div>
        </div>
        <div class="form-field">
            <label id="apiKeyLabel">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Securely paste your studio key...">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Studio Settings</button>
        <span id="settingsStatus" style="margin-left:12px;font-weight:700;"></span>
    </div>

    <!-- Step 1: Draft -->
    <div class="studio-card" style="animation-delay: 0.3s;">
        <h2>📝 Create New Draft</h2>
        <div class="form-row">
            <div class="form-field">
                <label>Post Category</label>
                <select id="category">
                    <option value="devotional">Devotional</option>
                    <option value="insight">Insight</option>
                    <option value="behind">Behind the Scenes</option>
                    <option value="tutorial">Tutorial</option>
                </select>
            </div>
            <div class="form-field">
                <label>Voice & Tone</label>
                <select id="tone">
                    <option value="warm and personal">Warm & Personal</option>
                    <option value="professional and informative">Professional</option>
                    <option value="encouraging and uplifting">Encouraging</option>
                    <option value="storytelling and narrative">Storytelling</option>
                </select>
            </div>
        </div>
        <div class="form-field">
            <label>The Inspiration (Topic or Verse)</label>
            <input type="text" id="topic" placeholder="e.g., The Beauty of Creation, Psalm 23 Reflection...">
        </div>
        <div class="form-field">
            <label>Specific Notes or Scriptures</label>
            <textarea id="notes" placeholder="Any specific points or verses you want the studio to include..."></textarea>
        </div>
        <button class="btn btn-primary" id="generateBtn" onclick="generatePost()">✨ Generate Draft</button>
        <div class="status" id="generateStatus"></div>
    </div>

    <!-- Step 2: Editor -->
    <div class="studio-card hidden" id="editCard" style="animation-delay: 0.4s;">
        <h2>🖋️ Refine & Format</h2>
        <div class="form-row">
            <div class="form-field">
                <label>Draft Title</label>
                <input type="text" id="postTitle">
            </div>
            <div class="form-field">
                <label>Featured Image URL</label>
                <input type="text" id="postImage" placeholder="https://..." oninput="previewImage()">
            </div>
        </div>
        <div id="imagePreview" class="image-preview hidden"></div>

        <div class="form-field">
            <label>Studio Content</label>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="execCmd('bold')"><b>B</b></button>
                <button class="toolbar-btn" onclick="execCmd('italic')"><i>I</i></button>
                <button class="toolbar-btn" onclick="execCmd('formatBlock','H2')">H2</button>
                <button class="toolbar-btn" onclick="execCmd('formatBlock','H3')">H3</button>
                <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')">•</button>
                <button class="toolbar-btn" onclick="execCmd('formatBlock','BLOCKQUOTE')">"</button>
                <button class="toolbar-btn" onclick="insertLink()">🔗</button>
            </div>
            <div class="editor-content" id="editor" contenteditable="true"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-accent" onclick="publishPost()">📤 Publish to Blog</button>
            <button class="btn btn-primary" onclick="generatePost()">🔄 Regenerate</button>
            <button class="btn btn-ghost" onclick="clearEditor()">Clear Studio</button>
        </div>
        <div class="status" id="publishStatus"></div>
    </div>

    <!-- Archive -->
    <div class="studio-card" style="animation-delay: 0.5s;">
        <h2>📋 Studio Archive</h2>
        <div id="postsList"></div>
    </div>
</div>

<script>
// ===== LOGIC (Kept same as original for functionality) =====
let currentProvider = localStorage.getItem('bfl-ai-provider') || 'gemini';
let apiKeys = JSON.parse(localStorage.getItem('bfl-api-keys') || '{}');

document.querySelectorAll('.provider-card').forEach(card => {
    card.classList.toggle('selected', card.dataset.provider === currentProvider);
});
document.getElementById('apiKey').value = apiKeys[currentProvider] || '';
loadPosts();

function selectProvider(provider) {
    currentProvider = provider;
    localStorage.setItem('bfl-ai-provider', provider);
    document.querySelectorAll('.provider-card').forEach(c => c.classList.toggle('selected', c.dataset.provider === provider));
    document.getElementById('apiKey').value = apiKeys[provider] || '';
    document.getElementById('apiKeyLabel').textContent = provider.charAt(0).toUpperCase() + provider.slice(1) + ' API Key';
}

function saveSettings() {
    const key = document.getElementById('apiKey').value.trim();
    if (key) {
        apiKeys[currentProvider] = key;
        localStorage.setItem('bfl-api-keys', JSON.stringify(apiKeys));
        const status = document.getElementById('settingsStatus');
        status.textContent = '✓ Studio Settings Saved';
        status.style.color = '#10b981';
        setTimeout(() => status.textContent = '', 2000);
    }
}

function execCmd(cmd, value) {
    document.execCommand(cmd, false, value || null);
    document.getElementById('editor').focus();
}

function insertLink() {
    const url = prompt('Enter URL:');
    if (url) document.execCommand('createLink', false, url);
}

function previewImage() {
    const url = document.getElementById('postImage').value.trim();
    const preview = document.getElementById('imagePreview');
    if (url) {
        preview.innerHTML = '<img src="' + url + '" alt="Preview" style="width:100%; height:200px; object-fit:cover; border-radius:20px; margin-bottom:20px;">';
        preview.classList.remove('hidden');
    } else {
        preview.classList.add('hidden');
    }
}

async function generatePost() {
    const key = apiKeys[currentProvider];
    if (!key) { showStatus('generateStatus', 'Please save your studio API key.', 'error'); return; }

    const topic = document.getElementById('topic').value.trim();
    if (!topic) { showStatus('generateStatus', 'What is your inspiration today?', 'error'); return; }

    const category = document.getElementById('category').value;
    const tone = document.getElementById('tone').value;
    const notes = document.getElementById('notes').value.trim();

    const prompt = `You are a blog writer for BibleFunLand Studios. Write a blog post:
Topic: ${topic}
Category: ${category}
Tone: ${tone}
${notes ? 'Notes: ' + notes : ''}

Write as Jerless, the founder. 400-600 words. Compelling title on first line prefixed with TITLE: [title]. Use HTML tags <p>, <h3>, <blockquote>.`;

    showStatus('generateStatus', '✨ Channeling inspiration...', 'loading');
    document.getElementById('generateBtn').disabled = true;

    try {
        let result;
        if (currentProvider === 'gemini') result = await callGemini(key, prompt);
        else if (currentProvider === 'openai') result = await callOpenAI(key, prompt);
        else if (currentProvider === 'claude') result = await callClaude(key, prompt);

        if (result) {
            let title = '';
            let content = result;
            if (result.includes('TITLE:')) {
                const lines = result.split('\n');
                title = lines[0].replace('TITLE:', '').trim();
                content = lines.slice(1).join('\n').trim();
            }
            document.getElementById('postTitle').value = title;
            document.getElementById('editor').innerHTML = content;
            document.getElementById('editCard').classList.remove('hidden');
            showStatus('generateStatus', '✓ Draft created! Refine it below.', 'success');
        }
    } catch (err) {
        showStatus('generateStatus', 'Connection Error: ' + err.message, 'error');
    }
    document.getElementById('generateBtn').disabled = false;
}

async function callGemini(key, prompt) {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + key, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
}

async function callOpenAI(key, prompt) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    return data.choices[0].message.content;
}

async function callClaude(key, prompt) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-3-5-sonnet-20240620', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    return data.content[0].text;
}

// =============================================
// Sanity Write Client (Editor token)
// =============================================
const SANITY_TOKEN = 'skCC83q6V1bi2WpBYrDVsRA2MiIStk6dvusKVL1p1rR7LRJEAWrYefCjAP83LxgXbaUir76AuahC2mvOvXe7INFQY4GQaUVrieYXE81wSoRnu0isjgTJAlh6vjCBWPyQvlugJyicFrlvNV4Iw1L924ljcdrDDdgPlKX4bB8umiDdYEsOG48P';
const SANITY_WRITE_URL = 'https://lrxq2sck.api.sanity.io/v2024-01-01/data/mutate/production';
const SANITY_QUERY_URL = 'https://lrxq2sck.apicdn.sanity.io/v2024-01-01/data/query/production';

async function sanityMutate(mutations) {
    const res = await fetch(SANITY_WRITE_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SANITY_TOKEN}`
        },
        body: JSON.stringify({ mutations })
    });
    if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.description || 'Sanity write failed');
    }
    return res.json();
}

async function sanityQuery(groq) {
    const res = await fetch(`${SANITY_QUERY_URL}?query=${encodeURIComponent(groq)}`, {
        headers: { 'Authorization': `Bearer ${SANITY_TOKEN}` }
    });
    const data = await res.json();
    return data.result;
}

async function publishPost() {
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('editor').innerHTML.trim();
    const image = document.getElementById('postImage').value.trim();
    const category = document.getElementById('category').value;
    const excerpt = content.replace(/<[^>]+>/g, '').slice(0, 200) + '...';
    const wordCount = content.replace(/<[^>]+>/g, '').split(/\s+/).length;
    const readTime = Math.ceil(wordCount / 200) + ' min';
    const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

    if (!title || !content) { showStatus('publishStatus', 'Title and content are required.', 'error'); return; }

    showStatus('publishStatus', '📡 Publishing to Sanity...', 'loading');

    const doc = {
        _type: 'blogPost',
        title,
        slug,
        category,
        excerpt,
        content,
        imageUrl: image || '',
        publishedAt: new Date().toISOString(),
        readTime,
        published: true
    };

    try {
        await sanityMutate([{ create: doc }]);
        showStatus('publishStatus', '✓ Published to Sanity! Your post is now live for everyone.', 'success');
        setTimeout(clearEditor, 2000);
        loadPosts();
    } catch (err) {
        showStatus('publishStatus', 'Error: ' + err.message, 'error');
    }
}

async function loadPosts() {
    const el = document.getElementById('postsList');
    el.innerHTML = '<p style="color:var(--text-light);">Loading posts...</p>';
    try {
        const posts = await sanityQuery(`*[_type == "blogPost"] | order(publishedAt desc) { _id, title, publishedAt, category, published }`);
        if (!posts || !posts.length) {
            el.innerHTML = '<p style="color:var(--text-light);">Your studio archive is empty. Publish your first post!</p>';
            return;
        }
        el.innerHTML = posts.map(p => `
            <div class="post-item">
                <div class="post-item-info">
                    <div style="font-weight:800; color:var(--primary);">${p.title}</div>
                    <div style="font-size:0.75rem; color:var(--text-light); margin-top:4px;">
                        ${p.publishedAt ? new Date(p.publishedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : 'No date'} · ${p.category}
                        <span style="color: ${p.published ? '#10b981' : '#f59e0b'}; margin-left:8px;">${p.published ? '● Live' : '○ Draft'}</span>
                    </div>
                </div>
                <div style="display:flex; gap:12px;">
                    <button class="btn" style="padding:8px 16px; background:rgba(26,46,90,0.05); color:var(--primary);" onclick="editPost('${p._id}')">Edit</button>
                    <button class="btn" style="padding:8px 16px; background:rgba(220,38,38,0.05); color:#dc2626;" onclick="deletePost('${p._id}')">Delete</button>
                </div>
            </div>`).join('');
    } catch (err) {
        el.innerHTML = `<p style="color:#ef4444;">Could not load posts: ${err.message}</p>`;
    }
}

async function deletePost(id) {
    if (!confirm('Permanently delete this post from Sanity?')) return;
    try {
        await sanityMutate([{ delete: { id } }]);
        loadPosts();
    } catch (err) {
        alert('Delete failed: ' + err.message);
    }
}

async function editPost(id) {
    try {
        const posts = await sanityQuery(`*[_type == "blogPost" && _id == "${id}"][0]`);
        if (!posts) return;
        document.getElementById('postTitle').value = posts.title || '';
        document.getElementById('postImage').value = posts.imageUrl || '';
        document.getElementById('editor').innerHTML = posts.content || '';
        document.getElementById('category').value = posts.category || 'insight';
        document.getElementById('editCard').classList.remove('hidden');
        previewImage();
        // Delete old version so re-publish creates a fresh one
        await sanityMutate([{ delete: { id } }]);
        window.scrollTo({ top: document.getElementById('editCard').offsetTop - 100, behavior: 'smooth' });
    } catch (err) {
        alert('Could not load post for editing: ' + err.message);
    }
}

function clearEditor() {
    document.getElementById('postTitle').value = '';
    document.getElementById('postImage').value = '';
    document.getElementById('editor').innerHTML = '';
    document.getElementById('editCard').classList.add('hidden');
    document.getElementById('publishStatus').textContent = '';
}

function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; 
    el.style.display = 'block';
    el.style.marginTop = '15px';
    el.style.fontSize = '0.9rem';
    el.style.fontWeight = '700';
    el.style.color = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6';
}
</script>
</body>
</html>
