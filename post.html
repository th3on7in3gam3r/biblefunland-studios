<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="twitter:image" content="https://biblefunlandstudios.com/faith-meets-the-page.png" id="twitterImage">

    <script type="application/ld+json" id="articleSchema">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "Blog Article",
      "description": "Read faith-inspired reflections, devotionals, and behind-the-scenes stories from BibleFunLand Studios.",
      "mainEntityOfPage": "https://biblefunlandstudios.com/blog.html",
      "publisher": {
        "@type": "Organization",
        "name": "BibleFunLand Studios",
        "url": "https://biblefunlandstudios.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://biblefunlandstudios.com/loading_icon.png"
        }
      }
    }
    </script>
    <script>PostSeoHead.applyMeta();</script>
    <style>
        .post-page { 
            padding: 160px 0 100px; 
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }

        .post-container { 
            max-width: 840px; 
            margin: 0 auto; 
            padding: 0 24px; 
            position: relative;
            z-index: 2;
        }

        .post-content-wrapper {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        .post-meta { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 24px; 
            flex-wrap: wrap; 
        }

        .post-category { 
            font-size: 0.7rem; 
            font-weight: 800; 
            padding: 6px 16px; 
            border-radius: 50px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .post-date, .post-read-time { 
            font-size: 0.85rem; 
            color: var(--text-light); 
            font-weight: 500;
        }

        .post-title { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.2rem, 5vw, 3.5rem); 
            font-weight: 900; 
            color: var(--primary); 
            margin-bottom: 32px; 
            line-height: 1.1; 
            letter-spacing: -1px;
        }

        .post-image-container {
            width: 100%;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .post-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.6s ease;
        }

        .post-image-container:hover .post-image {
            transform: scale(1.03);
        }

        .post-body { 
            font-size: 1.15rem; 
            line-height: 1.9; 
            color: var(--text); 
        }

        .post-body h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            margin: 48px 0 20px; 
            color: var(--primary); 
            font-weight: 800;
        }

        .post-body p { margin-bottom: 24px; }

        .post-body blockquote { 
            border-left: 5px solid var(--accent); 
            padding: 30px 40px; 
            margin: 40px 0; 
            font-style: italic; 
            color: var(--primary); 
            background: rgba(232, 168, 56, 0.05); 
            border-radius: 0 24px 24px 0;
            font-size: 1.3rem;
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
        }

        .post-body ul, .post-body ol { margin: 24px 0 24px 32px; }
        .post-body li { margin-bottom: 12px; }

        .post-back { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 40px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: var(--text-light); 
            text-decoration: none; 
            transition: all 0.3s;
        }

        .post-back:hover { 
            color: var(--primary); 
            transform: translateX(-5px);
        }

        .post-footer { 
            margin-top: 60px; 
            padding-top: 40px; 
            border-top: 1px solid rgba(0,0,0,0.06); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .share-buttons {
            display: flex;
            gap: 15px;
        }

        .share-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .share-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .post-content-wrapper { padding: 40px 24px; border-radius: 30px; }
            .post-image-container { height: 300px; }
            .post-title { font-size: 2rem; }
            .post-page { padding: 120px 0 60px; }
        }
    </style>
</head>
<body>
    <script src="/theme-loader.js"></script>

    <!-- Reading Progress Bar -->
    <div class="reading-progress-container">
        <div class="reading-progress-bar" id="readingProgress"></div>
    </div>

    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">BibleFunLand<span class="logo-accent">Studios</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog.html">Blog</a></li>
                <li><a href="/#about">About</a></li>
                <li><a href="/#brands">Brands</a></li>
                <li><a href="/#contact" class="btn btn-nav">Get In Touch</a></li>
            </ul>
        </div>
    </nav>

    <section class="post-page">
        <!-- Hero Blobs -->
        <div class="hero-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="post-container" id="postContainer">
            <!-- Post content loaded by JS -->
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="/" class="logo">
                        <span class="logo-icon">✦</span>
                        <span class="logo-text">BibleFunLand<span class="logo-accent">Studios</span></span>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 BibleFunLand Studios. All rights reserved. Made with ❤️ and faith.</p>
            </div>
        </div>
    </footer>

    <script>
        // Reading Progress Bar
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('readingProgress').style.width = scrolled + "%";
        });

        const siteUrl = 'https://biblefunlandstudios.com';
        const params = new URLSearchParams(window.location.search);
        const currentPath = window.location.pathname.replace(/\/+$/, '');
        const pathSlug = currentPath.startsWith('/blog/') ? decodeURIComponent(currentPath.slice('/blog/'.length)) : '';
        const postSlug = params.get('slug') || pathSlug;
        const postId = params.get('id');
        const container = document.getElementById('postContainer');

        function setMetaContent(id, content) {
            const el = document.getElementById(id);
            if (el && content) el.setAttribute('content', content);
        }

        function setCanonical(url) {
            const canonical = document.getElementById('canonicalLink');
            if (canonical && url) canonical.setAttribute('href', url);
        }

        function setRobots(content) {
            const robots = document.querySelector('meta[name="robots"]');
            if (robots && content) robots.setAttribute('content', content);
        }

        function decodeHtml(raw) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = raw || '';
            return textarea.value;
        }

        function stripTags(html) {
            const div = document.createElement('div');
            div.innerHTML = html || '';
            return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
        }

        function toAbsoluteUrl(url) {
            if (!url) return siteUrl + '/faith-meets-the-page.png';
            if (/^https?:\/\//i.test(url)) return url;
            return siteUrl + '/' + url.replace(/^\/+/, '');
        }

        function toIsoDate(value) {
            if (!value) return undefined;
            const parsed = new Date(value);
            return Number.isNaN(parsed.getTime()) ? undefined : parsed.toISOString();
        }

        function slugify(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
        }

        function normalizeSlug(slug, title) {
            if (typeof slug === 'string' && slug.trim()) return slug.trim();
            if (slug && typeof slug.current === 'string' && slug.current.trim()) return slug.current.trim();
            return slugify(title);
        }

        function getArticlePath(post) {
            const slug = normalizeSlug(post.slug, post.title);
            if (slug) return '/blog/' + encodeURIComponent(slug);
            const fallbackId = encodeURIComponent(post._id || post.id || '');
            return fallbackId ? '/post.html?id=' + fallbackId : '/post.html';
        }

        function syncBrowserUrl(post) {
            const articlePath = getArticlePath(post);
            const currentLocation = window.location.pathname + window.location.search;
            if (articlePath && currentLocation !== articlePath) {
                window.history.replaceState({}, '', articlePath);
            }
            return siteUrl + articlePath;
        }

        function updateArticleSchema(post, renderedContent, articleUrl, imageUrl, description) {
            const schemaEl = document.getElementById('articleSchema');
            if (!schemaEl) return;

            const schema = {
                "@context": "https://schema.org",
                "@type": "BlogPosting",
                "headline": post.title,
                "description": description,
                "mainEntityOfPage": articleUrl,
                "url": articleUrl,
                "image": imageUrl,
                "articleSection": post.category || 'insight',
                "author": {
                    "@type": "Person",
                    "name": "Jerless"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "BibleFunLand Studios",
                    "url": siteUrl,
                    "logo": {
                        "@type": "ImageObject",
                        "url": siteUrl + '/loading_icon.png'
                    }
                }
            };

            const datePublished = toIsoDate(post.publishedAt || post.date);
            if (datePublished) {
                schema.datePublished = datePublished;
                schema.dateModified = datePublished;
            }

            const articleBody = stripTags(renderedContent);
            if (articleBody) {
                schema.articleBody = articleBody;
                schema.wordCount = articleBody.split(/\s+/).filter(Boolean).length;
            }

            schemaEl.textContent = JSON.stringify(schema, null, 2);
        }

        function updateSeo(post, renderedContent) {
            const articleUrl = syncBrowserUrl(post);
            const imageUrl = toAbsoluteUrl(post.image || post.imageUrl);
            const plainText = stripTags(renderedContent);
            const description = (plainText || post.content || '')
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, 160) || 'Read faith-inspired reflections, devotionals, and behind-the-scenes stories from BibleFunLand Studios.';
            const pageTitle = post.title + ' | BibleFunLand Studios';

            document.title = pageTitle;
            setCanonical(articleUrl);
            setMetaContent('ogTitle', pageTitle);
            setMetaContent('ogDescription', description);
            setMetaContent('ogImage', imageUrl);
            setMetaContent('ogUrl', articleUrl);
            setMetaContent('twitterTitle', pageTitle);
            setMetaContent('twitterDescription', description);
            setMetaContent('twitterImage', imageUrl);

            const descriptionMeta = document.querySelector('meta[name="description"]');
            if (descriptionMeta) descriptionMeta.setAttribute('content', description);

            setRobots('index, follow');
            updateArticleSchema(post, renderedContent, articleUrl, imageUrl, description);
        }

        function setNoIndexSeo() {
            document.title = 'Post Not Found | BibleFunLand Studios';
            setCanonical(siteUrl + '/blog.html');
            setMetaContent('ogTitle', 'Post Not Found | BibleFunLand Studios');
            setMetaContent('ogDescription', 'This blog post could not be found. Browse devotionals, studio insights, and ministry articles on BibleFunLand Studios.');
            setMetaContent('ogImage', siteUrl + '/faith-meets-the-page.png');
            setMetaContent('ogUrl', siteUrl + '/blog.html');
            setMetaContent('twitterTitle', 'Post Not Found | BibleFunLand Studios');
            setMetaContent('twitterDescription', 'This blog post could not be found. Browse devotionals, studio insights, and ministry articles on BibleFunLand Studios.');
            setMetaContent('twitterImage', siteUrl + '/faith-meets-the-page.png');

            const descriptionMeta = document.querySelector('meta[name="description"]');
            if (descriptionMeta) {
                descriptionMeta.setAttribute('content', 'This blog post could not be found. Browse devotionals, studio insights, and ministry articles on BibleFunLand Studios.');
            }

            setRobots('noindex, follow');
        }

        // Static fallback posts
        const staticPosts = [
            { id: '1', slug: 'designing-for-kids-lessons-from-bfl-junior', category: 'insight', emoji: '🎨', title: 'Designing for Kids: Lessons from BFL Junior', date: 'April 28, 2026', readTime: '4 min read', image: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=800', content: '<p>What we learned building a platform for young believers — and how it changed our approach to design forever.</p><h2>The Core Lessons</h2><p>Designing for children requires a unique blend of simplicity and engagement. We found that bold colors and clear iconography aren\'t just aesthetic choices—they are functional requirements.</p><blockquote>"Let the little children come to me, and do not hinder them, for the kingdom of heaven belongs to such as these." — Matthew 19:14</blockquote><p>Our approach was always kingdom-first. We wanted to create a space where the gospel was accessible, fun, and beautiful.</p>' },
            { id: '2', slug: 'creating-with-purpose-colossians-3-23', category: 'devotional', emoji: '📖', title: 'Creating with Purpose: A Colossians 3:23 Reflection', date: 'April 15, 2026', readTime: '3 min read', image: 'https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=800', content: '<p>"Whatever you do, work at it with all your heart." What does this mean for those of us called to create?</p><h2>Excellence as Worship</h2><p>In our studio, we believe that every pixel and every line of code can be an act of worship. When we strive for excellence, we reflect the nature of the Creator.</p><blockquote>"Whatever you do, work at it with all your heart, as working for the Lord, not for human masters." — Colossians 3:23</blockquote>' },
            { id: '3', slug: 'from-one-idea-to-six-brands', category: 'behind', emoji: '🚀', title: 'From One Idea to Six Brands: The BFL Story', date: 'March 30, 2026', readTime: '6 min read', image: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=800', content: '<p>The story of how BibleFunLand Studios grew from a single project into a family of faith-based platforms.</p><h2>The Humble Beginnings</h2><p>It started with a simple vision to make Bible learning fun. One brand led to another as we saw the vast need for quality Christian media across different niches.</p>' },
            { id: '4', slug: '5-branding-mistakes-churches-make', category: 'tutorial', emoji: '💡', title: '5 Branding Mistakes Churches Make (And How to Fix Them)', date: 'March 15, 2026', readTime: '7 min read', image: '5-branding-mistakes-churches-make.png', content: '<p>Your church\'s visual identity matters more than you think. Here are the most common pitfalls and practical solutions.</p><h2>1. Inconsistency</h2><p>Using different logos and fonts across social media, bulletins, and your website creates confusion. A unified identity builds trust.</p>' },
            { id: '5', slug: 'vision-bigger-than-your-skill', category: 'devotional', emoji: '🙏', title: 'When God Gives You a Vision Bigger Than Your Skill', date: 'March 1, 2026', readTime: '4 min read', image: 'vision-bigger-than-your-skill.png', content: '<p>A devotional on trusting the process, growing into your calling, and letting God fill the gaps in your ability.</p><h2>Trusting the Process</h2><p>Often, God calls us to things we don\'t feel prepared for. That\'s where faith steps in. He provides the strength for the vision He provides.</p>' },
            { id: '6', slug: 'building-awc-connect', category: 'behind', emoji: '🎥', title: 'Building AWC Connect: A Ministry App Case study', date: 'February 14, 2026', readTime: '8 min read', image: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800', content: '<p>How we designed and developed a community app for Anointed Worship Center — from wireframes to launch day.</p><h2>The Challenge</h2><p>Building a space for a church community to stay connected through the week was the goal. We focused on simplicity and daily engagement features.</p>' }
        ];

        function renderPost(post) {
            const catClass = 'cat-' + (post.category || 'insight');
            const renderedContent = decodeHtml(post.content);
            updateSeo(post, renderedContent);
            container.innerHTML = `
                <a href="/blog.html" class="post-back">← Back to Blog</a>
                <article class="post-content-wrapper animate-up">
                    <div class="post-meta">
                        <span class="post-category ${catClass}">${post.category}</span>
                        <span class="post-date">${post.date || post.publishedAt ? new Date(post.publishedAt || post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : ''}</span>
                        <span class="post-read-time">${post.readTime}</span>
                    </div>
                    <h1 class="post-title">${post.title}</h1>
                    ${(post.image || post.imageUrl) ? `
                        <div class="post-image-container">
                            <img class="post-image" src="${post.image || post.imageUrl}" alt="${post.title}">
                        </div>
                    ` : ''}
                    <div class="post-body">${renderedContent}</div>
                    <div class="post-footer">
                        <a href="/blog.html" class="btn btn-secondary">← Back to Blog</a>
                        <div class="share-buttons">
                            <button class="share-btn" onclick="handleLike('${post._id || post.id}', 'like-btn-post', 'like-count-post')" id="like-btn-post" title="Like this post" style="width:auto; padding:0 15px; gap:8px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="${localStorage.getItem('liked_' + (post._id || post.id)) ? '#ef4444' : 'none'}" stroke="${localStorage.getItem('liked_' + (post._id || post.id)) ? '#ef4444' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                <span id="like-count-post" style="font-size:1rem; font-weight:700;">${post.likes || 0}</span>
                            </button>
                            <button class="share-btn" title="Share on Twitter">𝕏</button>
                            <button class="share-btn" title="Share on Facebook">f</button>
                            <button class="share-btn" onclick="navigator.clipboard.writeText(location.href); this.textContent='✓'" title="Copy Link">🔗</button>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderNotFound() {
            setNoIndexSeo();
            container.innerHTML = `
                <div class="post-not-found animate-up">
                    <div class="empty-icon">🏙️</div>
                    <h2>Post not found</h2>
                    <p>This post may have been removed or the link is incorrect.</p>
                    <br><a href="/blog.html" class="btn btn-primary">Back to Blog</a>
                </div>
            `;
        }

        async function loadPost() {
            if (!postSlug && !postId) { renderNotFound(); return; }

            if (postSlug) {
                try {
                    const sanityPost = await getPostBySlug(postSlug);
                    if (sanityPost) { renderPost(sanityPost); return; }
                } catch (e) {
                    console.warn('Sanity slug lookup failed, trying static:', e);
                }

                const staticPostBySlug = staticPosts.find(p => p.slug === postSlug);
                if (staticPostBySlug) { renderPost(staticPostBySlug); return; }
            }

            if (!postId) { renderNotFound(); return; }

            // Try Sanity first (live posts)
            try {
                const sanityPost = await getPostById(postId);
                if (sanityPost) { renderPost(sanityPost); return; }
            } catch (e) {
                console.warn('Sanity lookup failed, trying static:', e);
            }

            // Fall back to static demo posts
            const staticPost = staticPosts.find(p => p.id == postId);
            if (staticPost) { renderPost(staticPost); return; }

            renderNotFound();
        }

        loadPost();

        async function handleLike(postId, btnId, countId) {
            if (localStorage.getItem('liked_' + postId)) return; // Already liked
            
            const btn = document.getElementById(btnId);
            const countSpan = document.getElementById(countId);
            
            // Optimistic UI update
            btn.innerHTML = btn.innerHTML.replace(/fill="none"/, 'fill="#ef4444"').replace(/stroke="currentColor"/, 'stroke="#ef4444"');
            btn.style.transform = 'scale(1.1)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
            
            countSpan.textContent = parseInt(countSpan.textContent || '0') + 1;
            localStorage.setItem('liked_' + postId, 'true');

            // API call
            try {
                await fetch('/api/like', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: postId })
                });
            } catch (err) {
                console.error('Failed to update likes:', err);
            }
        }
    </script>
</body>
