<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | BibleFunLand Studios</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .error-info {
            text-align: center;
            margin-bottom: 24px;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -2px;
        }

        .error-message {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }

        .game-hint {
            font-size: 0.7rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        /* Game Container */
        .game-container {
            position: relative;
            width: 700px;
            max-width: 95vw;
            height: 200px;
            border-bottom: 2px solid #1a1a1a;
            overflow: hidden;
            cursor: pointer;
        }

        /* Player */
        .player {
            position: absolute;
            bottom: 2px;
            left: 60px;
            width: 30px;
            height: 40px;
        }

        .player-body {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .player-body::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #1a1a1a;
            box-shadow:
                4px 0 #1a1a1a, 8px 0 #1a1a1a, 12px 0 #1a1a1a,
                0 4px #1a1a1a, 4px 4px #1a1a1a, 8px 4px #1a1a1a, 12px 4px #1a1a1a, 16px 4px #1a1a1a,
                0 8px #1a1a1a, 4px 8px #fff, 8px 8px #1a1a1a, 12px 8px #fff, 16px 8px #1a1a1a,
                0 12px #1a1a1a, 4px 12px #1a1a1a, 8px 12px #1a1a1a, 12px 12px #1a1a1a, 16px 12px #1a1a1a,
                4px 16px #1a1a1a, 8px 16px #1a1a1a, 12px 16px #1a1a1a,
                0px 20px #1a1a1a, 4px 20px #1a1a1a, 8px 20px #1a1a1a, 12px 20px #1a1a1a, 16px 20px #1a1a1a,
                0px 24px #1a1a1a, 4px 24px #1a1a1a, 8px 24px #1a1a1a, 12px 24px #1a1a1a, 16px 24px #1a1a1a,
                4px 28px #1a1a1a, 8px 28px #1a1a1a, 12px 28px #1a1a1a,
                4px 32px #1a1a1a, 12px 32px #1a1a1a,
                4px 36px #1a1a1a, 12px 36px #1a1a1a;
        }

        .player.jumping {
            animation: jump 0.5s ease-out;
        }

        @keyframes jump {
            0% { bottom: 2px; }
            50% { bottom: 110px; }
            100% { bottom: 2px; }
        }

        /* Obstacles */
        .obstacle {
            position: absolute;
            bottom: 2px;
            right: -40px;
            width: 20px;
            height: 35px;
            animation: moveObstacle linear forwards;
        }

        .obstacle::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #1a1a1a;
            box-shadow:
                4px 0 #1a1a1a, 4px 4px #1a1a1a, 4px 8px #1a1a1a,
                4px 12px #1a1a1a, 4px 16px #1a1a1a, 4px 20px #1a1a1a,
                4px 24px #1a1a1a, 4px 28px #1a1a1a,
                0 8px #1a1a1a, 8px 8px #1a1a1a, 12px 8px #1a1a1a;
        }

        .obstacle.rock::before {
            box-shadow:
                4px 20px #1a1a1a, 8px 20px #1a1a1a,
                0 24px #1a1a1a, 4px 24px #1a1a1a, 8px 24px #1a1a1a, 12px 24px #1a1a1a,
                0 28px #1a1a1a, 4px 28px #1a1a1a, 8px 28px #1a1a1a, 12px 28px #1a1a1a, 16px 28px #1a1a1a,
                4px 32px #1a1a1a, 8px 32px #1a1a1a, 12px 32px #1a1a1a;
        }

        .obstacle.scroll::before {
            box-shadow:
                0 8px #1a1a1a, 4px 8px #1a1a1a, 8px 8px #1a1a1a, 12px 8px #1a1a1a,
                0 12px #1a1a1a, 12px 12px #1a1a1a,
                0 16px #1a1a1a, 12px 16px #1a1a1a,
                0 20px #1a1a1a, 12px 20px #1a1a1a,
                0 24px #1a1a1a, 4px 24px #1a1a1a, 8px 24px #1a1a1a, 12px 24px #1a1a1a,
                0 28px #1a1a1a, 4px 28px #1a1a1a, 8px 28px #1a1a1a, 12px 28px #1a1a1a;
        }

        @keyframes moveObstacle {
            0% { right: -40px; }
            100% { right: 720px; }
        }

        /* Score */
        .score-display {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a1a;
            letter-spacing: 1px;
        }

        .high-score {
            position: absolute;
            top: 12px;
            right: 100px;
            font-size: 0.75rem;
            color: #bbb;
        }

        /* Game Over overlay */
        .game-over {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over h2 {
            font-size: 1.2rem;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .game-over p {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }

        .game-over .restart-hint {
            margin-top: 12px;
            font-size: 0.65rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ground dots */
        .ground-dots {
            position: absolute;
            bottom: 6px;
            left: 0;
            width: 200%;
            height: 12px;
        }

        .ground-dots::before {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ddd;
            box-shadow:
                20px 0 #eee, 50px 3px #ddd, 80px 0 #eee, 120px 5px #ddd,
                160px 2px #eee, 200px 0 #ddd, 250px 3px #eee, 300px 0 #ddd,
                340px 5px #eee, 380px 2px #ddd, 420px 0 #eee, 470px 3px #ddd,
                510px 0 #eee, 560px 5px #ddd, 600px 2px #eee, 650px 0 #ddd;
        }

        .ground-running .ground-dots {
            animation: scrollGround 8s linear infinite;
        }

        @keyframes scrollGround {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Footer link */
        .page-footer {
            margin-top: 24px;
            text-align: center;
        }

        .page-footer a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .page-footer a:hover { color: #1a1a1a; }

        @media (max-width: 740px) {
            .game-container { height: 170px; }
            .error-code { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="error-info">
        <div class="error-code">404</div>
        <p class="error-message">Page not found</p>
        <p class="game-hint">Press SPACE or TAP anywhere to play</p>
    </div>

    <div class="game-container" id="game">
        <div class="ground-dots"></div>
        <div class="player" id="player">
            <div class="player-body"></div>
        </div>
        <span class="high-score" id="highScore">HI 0</span>
        <span class="score-display" id="score">0</span>
        <div class="game-over" id="gameOver">
            <h2>Game Over</h2>
            <p id="finalScore">Score: 0</p>
            <span class="restart-hint">Tap or press SPACE to retry</span>
        </div>
    </div>

    <div class="page-footer">
        <a href="index.html">← Back to BibleFunLand Studios</a>
    </div>

    <script>
        const game = document.getElementById('game');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let isJumping = false;
        let isGameRunning = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('bfl-runner-high') || '0');
        let speed = 3;
        let obstacleTimeout;
        let scoreInterval;

        highScoreDisplay.textContent = 'HI ' + highScore;

        // ===== SOUND EFFECTS =====
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playJumpSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playHitSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playMilestoneSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // ===== GAME =====
        function startGame() {
            gameOverScreen.classList.remove('show');
            isGameRunning = true;
            score = 0;
            speed = 3;
            scoreDisplay.textContent = '0';

            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.querySelectorAll('.obstacle').forEach(ob => ob.remove());
            game.classList.add('ground-running');

            spawnObstacle();

            scoreInterval = setInterval(() => {
                if (isGameRunning) {
                    score++;
                    scoreDisplay.textContent = score;
                    if (score % 50 === 0) speed += 0.5;
                    if (score % 100 === 0) playMilestoneSound();
                }
            }, 100);
        }

        function jump() {
            if (!isGameRunning) { startGame(); return; }
            if (isJumping) return;
            isJumping = true;
            player.classList.add('jumping');
            playJumpSound();
            setTimeout(() => { player.classList.remove('jumping'); isJumping = false; }, 500);
        }

        function spawnObstacle() {
            if (!isGameRunning) return;

            const obstacle = document.createElement('div');
            const types = ['', 'rock', 'scroll'];
            obstacle.className = 'obstacle ' + types[Math.floor(Math.random() * types.length)];

            const duration = Math.max(2.2 - (speed * 0.12), 0.8);
            obstacle.style.animationDuration = duration + 's';
            game.appendChild(obstacle);

            const checkCollision = setInterval(() => {
                if (!isGameRunning) { clearInterval(checkCollision); return; }

                const pr = player.getBoundingClientRect();
                const or2 = obstacle.getBoundingClientRect();

                if (pr.right - 6 > or2.left + 4 && pr.left + 6 < or2.right - 4 && pr.bottom > or2.top + 8) {
                    endGame();
                    clearInterval(checkCollision);
                }

                if (or2.right < 0) { obstacle.remove(); clearInterval(checkCollision); }
            }, 16);

            const minDelay = Math.max(600 - (speed * 30), 300);
            const maxDelay = Math.max(1400 - (speed * 60), 500);
            const nextDelay = minDelay + Math.random() * (maxDelay - minDelay);
            obstacleTimeout = setTimeout(spawnObstacle, nextDelay);
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(scoreInterval);
            clearTimeout(obstacleTimeout);
            game.classList.remove('ground-running');
            playHitSound();

            document.querySelectorAll('.obstacle').forEach(ob => ob.style.animationPlayState = 'paused');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bfl-runner-high', highScore.toString());
                highScoreDisplay.textContent = 'HI ' + highScore;
            }

            finalScoreEl.textContent = 'Score: ' + score;
            gameOverScreen.classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                gameOverScreen.classList.contains('show') ? startGame() : jump();
            }
        });

        game.addEventListener('click', () => {
            gameOverScreen.classList.contains('show') ? startGame() : jump();
        });

        game.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameOverScreen.classList.contains('show') ? startGame() : jump();
        });

        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('.page-footer')) return;
            if (gameOverScreen.classList.contains('show')) {
                startGame();
            } else if (isGameRunning) {
                jump();
            } else {
                startGame();
            }
        }, { passive: true });
    </script>
</body>
</html>
